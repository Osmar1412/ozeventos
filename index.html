<!DOCTYPE html>
<html lang="pt-br">
<head>

<link rel="stylesheet" href="style.css">

<body>

<header class="fade">

</header>

<nav>

    <a href="#servicos">Serviços</a>

<section id="sobre" class="fade">

</section>

<section id="servicos" class="fade">

<!-- EVENTOS DINÂMICOS -->

</section>

<section id="contato" class="contato fade">
    <h2>Solicite um Orçamento</h2>

    <form action="https://formsubmit.co/osmar.dj.oz@gmail.com" method="POST">
        <input type="hidden" name="_captcha" value="false">

        <input type="text" name="name" placeholder="Seu nome" required>

        <button type="submit">Enviar Mensagem</button>
    </form>

<a href="https://wa.me/5511947685370" class="whatsapp">💬</a>
